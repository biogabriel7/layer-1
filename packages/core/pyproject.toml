[project]
name = "core"
version = "0.1.0"
description = "Shared library for the extraction pipeline (LLM client, text utilities, Layer 1 output schema)"
requires-python = ">=3.13"
dependencies = [
  "openai>=2.30.0",
  "pydantic>=2.0",
  "python-dotenv>=1.2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
